<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amar Alarms Counter</title>
    <style>
      :root {
        --bg-top: #f7f4ea;
        --bg-bottom: #d8e9f5;
        --card: #ffffffcc;
        --ink: #1d2b36;
        --accent: #005f73;
        --accent-2: #0a9396;
        --danger: #b22222;
        --muted: #5f6c75;
        --shadow: 0 18px 40px rgba(0, 43, 64, 0.16);
        font-family: "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background:
          radial-gradient(circle at 15% 10%, #fff6d5 0%, transparent 40%),
          radial-gradient(circle at 85% 5%, #cce6ff 0%, transparent 40%),
          linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
        display: grid;
        place-items: center;
        padding: 2rem 1rem;
      }

      .panel {
        width: min(760px, 100%);
        background: var(--card);
        backdrop-filter: blur(6px);
        border: 1px solid #ffffff99;
        border-radius: 20px;
        box-shadow: var(--shadow);
        padding: 1.2rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.4rem, 3vw, 2rem);
        letter-spacing: 0.02em;
      }

      .sub {
        margin: 0.25rem 0 1rem;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .controls {
        display: grid;
        gap: 0.75rem;
        margin-bottom: 0.8rem;
      }

      .view-toggle {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.5rem;
        margin-bottom: 0.7rem;
      }

      .stack {
        display: grid;
        gap: 0.5rem;
      }

      label {
        font-size: 0.86rem;
        font-weight: 700;
      }

      select,
      input,
      button {
        width: 100%;
        border-radius: 10px;
        border: 1px solid #aac6d2;
        padding: 0.62rem 0.8rem;
        font-size: 0.98rem;
        background: #fff;
        color: var(--ink);
      }

      button {
        cursor: pointer;
        border: none;
        color: #fff;
        font-weight: 700;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
      }

      button.secondary {
        background: #7ec8ff;
        color: #08344d;
        border: 1px solid #5fb4f3;
      }

      button.danger {
        background: var(--danger);
      }

      .toolbar {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.5rem;
      }

      .table-wrap {
        margin: 1rem 0 0.6rem;
        border-radius: 14px;
        background: linear-gradient(135deg, #fff, #eef8ff);
        border: 1px solid #deedf5;
        overflow: hidden;
      }

      .view.hidden {
        display: none;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        text-align: left;
        padding: 0.72rem 0.9rem;
        border-bottom: 1px solid #d8e8f1;
      }

      th {
        font-size: 0.85rem;
        color: #274658;
        letter-spacing: 0.02em;
      }

      td:last-child,
      th:last-child {
        text-align: right;
      }

      tr:last-child td {
        border-bottom: none;
      }

      tbody tr {
        cursor: pointer;
      }

      tbody tr.selected {
        background: #dff1ff;
      }

      .graph-wrap {
        padding: 0.9rem;
        display: grid;
        gap: 0.55rem;
      }

      .bar-row {
        display: grid;
        grid-template-columns: minmax(120px, 1fr) 3fr auto;
        align-items: center;
        gap: 0.6rem;
        cursor: pointer;
        border-radius: 10px;
        padding: 0.2rem 0.3rem;
      }

      .bar-row.selected {
        background: #dff1ff;
      }

      .bar-label {
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }

      .podium-badge {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 1.6rem;
        height: 1.6rem;
        color: #c8a241;
      }

      .podium-icon {
        width: 1.5rem;
        height: 1.5rem;
        filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.22));
        animation: trophy-bob 2.2s ease-in-out infinite;
      }

      .podium-rank {
        position: absolute;
        top: 0.36rem;
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.6rem;
        font-weight: 800;
        color: #0f2230;
        line-height: 1;
        pointer-events: none;
      }

      .podium-gold {
        color: #d9ac32;
      }

      .podium-silver {
        color: #aeb8c3;
      }

      .podium-silver .podium-icon {
        animation-delay: 0.18s;
      }

      .podium-bronze {
        color: #ba7c48;
      }

      .podium-bronze .podium-icon {
        animation-delay: 0.32s;
      }

      @keyframes trophy-bob {
        0%,
        100% {
          transform: translateY(0) scale(1);
        }
        50% {
          transform: translateY(-2px) scale(1.04);
        }
      }

      .bar-track {
        width: 100%;
        height: 14px;
        border-radius: 999px;
        background: #e4eef5;
        overflow: hidden;
      }

      .bar-fill {
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(135deg, #2da8ff, #0a9396);
      }

      .bar-value {
        font-weight: 700;
        min-width: 2ch;
        text-align: right;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem 1rem;
        color: var(--muted);
        font-size: 0.88rem;
      }

      .status {
        min-height: 1.2rem;
        margin-top: 0.7rem;
        font-size: 0.9rem;
      }

      .status.error {
        color: var(--danger);
      }

      .bottom-actions {
        margin-top: 0.8rem;
      }

      @media (max-width: 600px) {
        .toolbar {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>Amar Alarms Counter</h1>
      <p class="sub">Choose a location and see alarms from February 2026 and later.</p>

      <section class="view-toggle" aria-label="Toggle view">
        <button id="tableViewBtn" type="button">Table View</button>
        <button id="graphViewBtn" type="button" class="secondary">Graph View</button>
      </section>

      <section id="tableView" class="table-wrap view" aria-live="polite">
        <table>
          <thead>
            <tr>
              <th>Location</th>
              <th>Alarm Count</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </section>
      <section id="graphView" class="table-wrap view hidden" aria-live="polite">
        <div id="graphBars" class="graph-wrap"></div>
      </section>

      <section class="controls" aria-label="Manage locations">
        <label for="newLocationInput">Add a location</label>
        <div class="toolbar">
          <input id="newLocationInput" type="text" placeholder="Type to search CSV locations" list="cityOptions" />
          <datalist id="cityOptions"></datalist>
          <button id="addLocationBtn" type="button" class="secondary">Add</button>
        </div>
        <button id="removeLocationBtn" type="button" class="danger">Remove Selected Location</button>
      </section>

      <div class="meta">
        <div>Total rows loaded: <span id="totalRows">0</span></div>
        <div>Last refreshed: <span id="lastRefreshed">Never</span></div>
      </div>

      <div id="status" class="status"></div>
      <div class="bottom-actions">
        <button id="refreshBtn" type="button">Refresh Data</button>
      </div>
    </main>

    <script>
      const DATA_URL =
        "https://raw.githubusercontent.com/yuval-harpaz/alarms/refs/heads/master/data/alarms.csv";
      const MIN_DATE = new Date("2026-02-01T00:00:00");
      const STORAGE_LOCATIONS_KEY = "alarmCounter.locations";
      const FALLBACK_LOCATIONS = ["מזכרת בתיה", "מרכז חבר", "שמשית", "בר יוחאי", "עפולה"];

      const els = {
        tableBody: document.getElementById("tableBody"),
        graphBars: document.getElementById("graphBars"),
        tableView: document.getElementById("tableView"),
        graphView: document.getElementById("graphView"),
        tableViewBtn: document.getElementById("tableViewBtn"),
        graphViewBtn: document.getElementById("graphViewBtn"),
        cityOptions: document.getElementById("cityOptions"),
        refreshBtn: document.getElementById("refreshBtn"),
        addLocationBtn: document.getElementById("addLocationBtn"),
        removeLocationBtn: document.getElementById("removeLocationBtn"),
        newLocationInput: document.getElementById("newLocationInput"),
        totalRows: document.getElementById("totalRows"),
        lastRefreshed: document.getElementById("lastRefreshed"),
        status: document.getElementById("status"),
      };

      let rows = [];
      let citySuggestions = [];
      let selectedLocation = "";
      let currentView = "table";

      function parseCSV(text) {
        const result = [];
        let row = [];
        let value = "";
        let inQuotes = false;

        for (let i = 0; i < text.length; i += 1) {
          const char = text[i];
          const next = text[i + 1];

          if (char === '"') {
            if (inQuotes && next === '"') {
              value += '"';
              i += 1;
            } else {
              inQuotes = !inQuotes;
            }
          } else if (char === "," && !inQuotes) {
            row.push(value);
            value = "";
          } else if ((char === "\n" || char === "\r") && !inQuotes) {
            if (char === "\r" && next === "\n") i += 1;
            row.push(value);
            if (row.length > 1 || row[0] !== "") {
              result.push(row);
            }
            row = [];
            value = "";
          } else {
            value += char;
          }
        }

        if (value.length > 0 || row.length > 0) {
          row.push(value);
          result.push(row);
        }

        if (result.length === 0) return [];

        const headers = result[0].map((h) => h.trim());
        return result.slice(1).map((cells) => {
          const obj = {};
          headers.forEach((h, i) => {
            obj[h] = (cells[i] || "").trim();
          });
          return obj;
        });
      }

      function loadLocations() {
        try {
          const raw = localStorage.getItem(STORAGE_LOCATIONS_KEY);
          if (!raw) return [...FALLBACK_LOCATIONS];
          const parsed = JSON.parse(raw);
          if (!Array.isArray(parsed)) return [...FALLBACK_LOCATIONS];
          const unique = [...new Set(parsed.map((v) => String(v).trim()).filter(Boolean))];
          return unique.length ? unique : [...FALLBACK_LOCATIONS];
        } catch {
          return [...FALLBACK_LOCATIONS];
        }
      }

      function saveLocations(locations) {
        localStorage.setItem(STORAGE_LOCATIONS_KEY, JSON.stringify(locations));
      }

      function updateStatus(message, isError = false) {
        els.status.textContent = message;
        els.status.classList.toggle("error", isError);
      }

      function countByLocation() {
        return rows.reduce((map, row) => {
          const city = row.cities;
          if (!city || !row.time) return map;
          const rowDate = new Date(row.time.replace(" ", "T"));
          if (Number.isNaN(rowDate.getTime()) || rowDate < MIN_DATE) return map;
          map[city] = (map[city] || 0) + 1;
          return map;
        }, {});
      }

      function getSortedLocationData() {
        const locations = loadLocations();
        const counts = countByLocation();
        const sortedLocations = [...locations].sort((a, b) => {
          const countDiff = (counts[b] || 0) - (counts[a] || 0);
          if (countDiff !== 0) return countDiff;
          return a.localeCompare(b);
        });
        return sortedLocations.map((location) => ({ location, count: counts[location] || 0 }));
      }

      function renderTable() {
        const data = getSortedLocationData();
        els.tableBody.innerHTML = "";

        data.forEach(({ location, count }) => {
          const tr = document.createElement("tr");
          tr.dataset.location = location;
          tr.classList.toggle("selected", location === selectedLocation);
          const locationCell = document.createElement("td");
          const countCell = document.createElement("td");
          locationCell.textContent = location;
          countCell.textContent = count.toLocaleString();
          tr.append(locationCell, countCell);
          els.tableBody.appendChild(tr);
        });
      }

      function renderGraph() {
        const data = getSortedLocationData();
        const maxCount = data.reduce((max, item) => Math.max(max, item.count), 0) || 1;
        els.graphBars.innerHTML = "";

        data.forEach(({ location, count }, index) => {
          const row = document.createElement("div");
          row.className = "bar-row";
          row.dataset.location = location;
          row.classList.toggle("selected", location === selectedLocation);

          const label = document.createElement("div");
          label.className = "bar-label";
          if (index < 3) {
            const badge = document.createElement("span");
            badge.className = "podium-badge";
            if (index === 0) badge.classList.add("podium-gold");
            if (index === 1) badge.classList.add("podium-silver");
            if (index === 2) badge.classList.add("podium-bronze");
            badge.innerHTML =
              `<svg class="podium-icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M18 2H6v3H3v3c0 2.76 2.24 5 5 5h.28A6.99 6.99 0 0 0 11 16.93V20H8v2h8v-2h-3v-3.07A6.99 6.99 0 0 0 15.72 13H16c2.76 0 5-2.24 5-5V5h-3V2Zm-2 9V4H8v7a4 4 0 1 0 8 0ZM5 8V7h1v3.82A3 3 0 0 1 5 8Zm14 0a3 3 0 0 1-1 2.24V7h1v1Z"/></svg><span class="podium-rank">${index + 1}</span>`;
            label.appendChild(badge);
          }
          label.appendChild(document.createTextNode(location));

          const track = document.createElement("div");
          track.className = "bar-track";
          const fill = document.createElement("div");
          fill.className = "bar-fill";
          fill.style.width = `${(count / maxCount) * 100}%`;
          track.appendChild(fill);

          const value = document.createElement("div");
          value.className = "bar-value";
          value.textContent = count.toLocaleString();

          row.append(label, track, value);
          els.graphBars.appendChild(row);
        });
      }

      function renderViews() {
        renderTable();
        renderGraph();
      }

      function setView(view) {
        currentView = view;
        const showTable = currentView === "table";
        els.tableView.classList.toggle("hidden", !showTable);
        els.graphView.classList.toggle("hidden", showTable);
        els.tableViewBtn.classList.toggle("secondary", !showTable);
        els.graphViewBtn.classList.toggle("secondary", showTable);
      }

      function renderAutocomplete() {
        els.cityOptions.innerHTML = "";

        citySuggestions.forEach((city) => {
          const option = document.createElement("option");
          option.value = city;
          els.cityOptions.appendChild(option);
        });
      }

      async function refreshData() {
        updateStatus("Refreshing data...");
        els.refreshBtn.disabled = true;

        try {
          const response = await fetch(DATA_URL, { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const text = await response.text();
          rows = parseCSV(text);
          citySuggestions = [...new Set(rows.map((row) => row.cities).filter(Boolean))].sort((a, b) =>
            a.localeCompare(b)
          );
          els.totalRows.textContent = rows.length.toLocaleString();
          els.lastRefreshed.textContent = new Date().toLocaleString();
          renderAutocomplete();
          renderViews();
          updateStatus("Data refreshed successfully.");
        } catch (error) {
          updateStatus(`Failed to refresh data: ${error.message}`, true);
        } finally {
          els.refreshBtn.disabled = false;
        }
      }

      function addLocation() {
        const value = els.newLocationInput.value.trim();
        if (!value) {
          updateStatus("Enter a location name before adding.", true);
          return;
        }

        const locations = loadLocations();
        if (locations.includes(value)) {
          updateStatus("Location already exists.", true);
          return;
        }

        if (citySuggestions.length > 0 && !citySuggestions.includes(value)) {
          updateStatus("Location must match a city that exists in the CSV.", true);
          return;
        }

        locations.push(value);
        saveLocations(locations);
        selectedLocation = value;
        renderViews();
        els.newLocationInput.value = "";
        updateStatus(`Added location: ${value}`);
      }

      function removeSelectedLocation() {
        const selected = selectedLocation;
        if (!selected) {
          updateStatus("Select a location in the table to remove.", true);
          return;
        }

        const locations = loadLocations().filter((location) => location !== selected);

        if (locations.length === 0) {
          updateStatus("Keep at least one location in the list.", true);
          return;
        }

        saveLocations(locations);
        selectedLocation = locations[0] || "";
        renderViews();
        updateStatus(`Removed location: ${selected}`);
      }

      function bindEvents() {
        els.refreshBtn.addEventListener("click", refreshData);
        els.addLocationBtn.addEventListener("click", addLocation);
        els.removeLocationBtn.addEventListener("click", removeSelectedLocation);
        els.tableViewBtn.addEventListener("click", () => setView("table"));
        els.graphViewBtn.addEventListener("click", () => setView("graph"));
        els.tableBody.addEventListener("click", (event) => {
          const row = event.target.closest("tr");
          if (!row || !row.dataset.location) return;
          selectedLocation = row.dataset.location;
          renderViews();
        });
        els.graphBars.addEventListener("click", (event) => {
          const row = event.target.closest(".bar-row");
          if (!row || !row.dataset.location) return;
          selectedLocation = row.dataset.location;
          renderViews();
        });

        els.newLocationInput.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            addLocation();
          }
        });
      }

      function init() {
        selectedLocation = loadLocations()[0] || "";
        renderViews();
        setView("graph");
        bindEvents();
        refreshData();
      }

      init();
    </script>

  </body>
</html>
