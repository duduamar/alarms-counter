<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amar Alarms Counter</title>
    <style>
      :root {
        --bg-top: #f7f4ea;
        --bg-bottom: #d8e9f5;
        --card: #ffffffcc;
        --ink: #1d2b36;
        --accent: #005f73;
        --accent-2: #0a9396;
        --danger: #b22222;
        --muted: #5f6c75;
        --shadow: 0 18px 40px rgba(0, 43, 64, 0.16);
        font-family: "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background:
          radial-gradient(circle at 15% 10%, #fff6d5 0%, transparent 40%),
          radial-gradient(circle at 85% 5%, #cce6ff 0%, transparent 40%),
          linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
        display: grid;
        place-items: center;
        padding: 2rem 1rem;
      }

      .panel {
        width: min(760px, 100%);
        background: var(--card);
        backdrop-filter: blur(6px);
        border: 1px solid #ffffff99;
        border-radius: 20px;
        box-shadow: var(--shadow);
        padding: 1.2rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.4rem, 3vw, 2rem);
        letter-spacing: 0.02em;
      }

      .sub {
        margin: 0.25rem 0 1rem;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .controls {
        display: grid;
        gap: 0.75rem;
        margin-bottom: 0.8rem;
      }

      .view-toggle {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.5rem;
        margin-bottom: 0.7rem;
      }

      .stack {
        display: grid;
        gap: 0.5rem;
      }

      label {
        font-size: 0.86rem;
        font-weight: 700;
      }

      select,
      input,
      button {
        width: 100%;
        border-radius: 10px;
        border: 1px solid #aac6d2;
        padding: 0.62rem 0.8rem;
        font-size: 0.98rem;
        background: #fff;
        color: var(--ink);
      }

      button {
        cursor: pointer;
        border: none;
        color: #fff;
        font-weight: 700;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
      }

      button.secondary {
        background: #7ec8ff;
        color: #08344d;
        border: 1px solid #5fb4f3;
      }

      button.danger {
        background: var(--danger);
      }

      .toolbar {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.5rem;
      }

      .table-wrap {
        margin: 1rem 0 0.6rem;
        border-radius: 14px;
        background: linear-gradient(135deg, #fff, #eef8ff);
        border: 1px solid #deedf5;
        overflow: hidden;
      }

      .view.hidden {
        display: none;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        text-align: left;
        padding: 0.72rem 0.9rem;
        border-bottom: 1px solid #d8e8f1;
      }

      th {
        font-size: 0.85rem;
        color: #274658;
        letter-spacing: 0.02em;
      }

      td:last-child,
      th:last-child {
        text-align: right;
      }

      tr:last-child td {
        border-bottom: none;
      }

      tbody tr {
        cursor: pointer;
      }

      tbody tr.selected {
        background: #dff1ff;
      }

      .graph-wrap {
        padding: 0.9rem;
        display: grid;
        gap: 0.55rem;
      }

      .trend-controls {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 0.6rem;
        align-items: end;
      }

      .trend-chart {
        border-radius: 12px;
        background: #ffffff;
        border: 1px solid #d8e8f1;
        padding: 0.6rem;
        overflow-x: auto;
      }

      .trend-chart svg {
        display: block;
      }

      .trend-legend {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem 0.9rem;
        font-size: 0.85rem;
        color: var(--muted);
        align-items: center;
      }

      .trend-legend button {
        width: auto;
        font-size: 0.78rem;
        padding: 0.35rem 0.55rem;
        border-radius: 8px;
      }

      .trend-legend span {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        cursor: pointer;
        padding: 0.15rem 0.4rem;
        border-radius: 999px;
        border: 1px solid transparent;
      }

      .legend-swatch {
        width: 0.65rem;
        height: 0.65rem;
        border-radius: 999px;
      }

      .trend-legend span.hidden {
        opacity: 0.45;
        text-decoration: line-through;
        border-color: #d3dee6;
      }

      .trend-empty {
        padding: 1.2rem;
        color: var(--muted);
        text-align: center;
      }

      .bar-row {
        display: grid;
        grid-template-columns: minmax(120px, 1fr) 3fr auto;
        align-items: center;
        gap: 0.6rem;
        cursor: pointer;
        border-radius: 10px;
        padding: 0.2rem 0.3rem;
      }

      .bar-row.selected {
        background: #dff1ff;
      }

      .bar-label {
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }

      .podium-badge {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 1.6rem;
        height: 1.6rem;
        color: #c8a241;
      }

      .podium-icon {
        width: 1.5rem;
        height: 1.5rem;
        filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.22));
        animation: trophy-bob 2.2s ease-in-out infinite;
      }

      .podium-rank {
        position: absolute;
        top: 0.36rem;
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.6rem;
        font-weight: 800;
        color: #0f2230;
        line-height: 1;
        pointer-events: none;
      }

      .podium-gold {
        color: #d9ac32;
      }

      .podium-silver {
        color: #aeb8c3;
      }

      .podium-silver .podium-icon {
        animation-delay: 0.18s;
      }

      .podium-bronze {
        color: #ba7c48;
      }

      .podium-bronze .podium-icon {
        animation-delay: 0.32s;
      }

      @keyframes trophy-bob {
        0%,
        100% {
          transform: translateY(0) scale(1);
        }
        50% {
          transform: translateY(-2px) scale(1.04);
        }
      }

      .bar-track {
        width: 100%;
        height: 14px;
        border-radius: 999px;
        background: #e4eef5;
        overflow: hidden;
      }

      .bar-fill {
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(135deg, #2da8ff, #0a9396);
      }

      .bar-value {
        font-weight: 700;
        min-width: 2ch;
        text-align: right;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem 1rem;
        color: var(--muted);
        font-size: 0.88rem;
      }

      .status {
        min-height: 1.2rem;
        margin-top: 0.7rem;
        font-size: 0.9rem;
      }

      .status.error {
        color: var(--danger);
      }

      .bottom-actions {
        margin-top: 0.8rem;
      }

      @media (max-width: 600px) {
        .toolbar {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>Amar Alarms Counter</h1>
      <p class="sub">Choose a location and see alarms from February 2026 and later.</p>

      <section class="view-toggle" aria-label="Toggle view">
        <button id="tableViewBtn" type="button">Table View</button>
        <button id="graphViewBtn" type="button" class="secondary">Graph View</button>
        <button id="trendViewBtn" type="button" class="secondary">Trend View</button>
      </section>

      <section id="tableView" class="table-wrap view" aria-live="polite">
        <table>
          <thead>
            <tr>
              <th>Location</th>
              <th>Alarm Count</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </section>
      <section id="graphView" class="table-wrap view hidden" aria-live="polite">
        <div id="graphBars" class="graph-wrap"></div>
      </section>
      <section id="trendView" class="table-wrap view hidden" aria-live="polite">
        <div class="graph-wrap">
          <div class="trend-controls">
            <div class="stack">
              <label for="trendBucket">Time bucket</label>
              <select id="trendBucket">
                <option value="day">Daily</option>
                <option value="week">Weekly</option>
              </select>
            </div>
            <div class="stack">
              <label for="trendRange">Range</label>
              <select id="trendRange">
                <option value="30">Last 30 days</option>
                <option value="90" selected>Last 90 days</option>
                <option value="180">Last 180 days</option>
                <option value="all">All time</option>
              </select>
            </div>
          </div>
          <div id="trendChart" class="trend-chart"></div>
          <div id="trendLegend" class="trend-legend">
            <button id="trendHideAll" type="button" class="secondary">Hide all</button>
            <button id="trendShowAll" type="button" class="secondary">Show all</button>
          </div>
        </div>
      </section>

      <section class="controls" aria-label="Manage locations">
        <label for="newLocationInput">Add a location</label>
        <div class="toolbar">
          <input id="newLocationInput" type="text" placeholder="Type to search CSV locations" list="cityOptions" />
          <datalist id="cityOptions"></datalist>
          <button id="addLocationBtn" type="button" class="secondary">Add</button>
        </div>
        <button id="removeLocationBtn" type="button" class="danger">Remove Selected Location</button>
      </section>

      <div class="meta">
        <div>Total rows loaded: <span id="totalRows">0</span></div>
        <div>Last refreshed: <span id="lastRefreshed">Never</span></div>
      </div>

      <div id="status" class="status"></div>
      <div class="bottom-actions">
        <button id="refreshBtn" type="button">Refresh Data</button>
      </div>
    </main>

    <script>
      const DATA_URL =
        "https://raw.githubusercontent.com/yuval-harpaz/alarms/refs/heads/master/data/alarms.csv";
      const MIN_DATE = new Date("2026-02-01T00:00:00");
      const STORAGE_LOCATIONS_KEY = "alarmCounter.locations";
      const STORAGE_TREND_HIDDEN_KEY = "alarmCounter.trendHidden";
      const STORAGE_VIEW_KEY = "alarmCounter.activeView";
      const FALLBACK_LOCATIONS = ["מזכרת בתיה", "מרכז חבר", "שמשית", "בר יוחאי", "עפולה"];

      const els = {
        tableBody: document.getElementById("tableBody"),
        graphBars: document.getElementById("graphBars"),
        tableView: document.getElementById("tableView"),
        graphView: document.getElementById("graphView"),
        trendView: document.getElementById("trendView"),
        tableViewBtn: document.getElementById("tableViewBtn"),
        graphViewBtn: document.getElementById("graphViewBtn"),
        trendViewBtn: document.getElementById("trendViewBtn"),
        cityOptions: document.getElementById("cityOptions"),
        refreshBtn: document.getElementById("refreshBtn"),
        addLocationBtn: document.getElementById("addLocationBtn"),
        removeLocationBtn: document.getElementById("removeLocationBtn"),
        newLocationInput: document.getElementById("newLocationInput"),
        totalRows: document.getElementById("totalRows"),
        lastRefreshed: document.getElementById("lastRefreshed"),
        status: document.getElementById("status"),
        trendBucket: document.getElementById("trendBucket"),
        trendRange: document.getElementById("trendRange"),
        trendChart: document.getElementById("trendChart"),
        trendLegend: document.getElementById("trendLegend"),
        trendHideAll: document.getElementById("trendHideAll"),
        trendShowAll: document.getElementById("trendShowAll"),
      };

      let rows = [];
      let citySuggestions = [];
      let selectedLocation = "";
      let currentView = "table";
      let hiddenTrendLocations = new Set();
      const TREND_COLORS = [
        "#005f73",
        "#0a9396",
        "#2da8ff",
        "#f4a261",
        "#e76f51",
        "#2a9d8f",
        "#3d405b",
        "#e9c46a",
        "#264653",
        "#6d597a",
      ];

      function parseCSV(text) {
        const result = [];
        let row = [];
        let value = "";
        let inQuotes = false;

        for (let i = 0; i < text.length; i += 1) {
          const char = text[i];
          const next = text[i + 1];

          if (char === '"') {
            if (inQuotes && next === '"') {
              value += '"';
              i += 1;
            } else {
              inQuotes = !inQuotes;
            }
          } else if (char === "," && !inQuotes) {
            row.push(value);
            value = "";
          } else if ((char === "\n" || char === "\r") && !inQuotes) {
            if (char === "\r" && next === "\n") i += 1;
            row.push(value);
            if (row.length > 1 || row[0] !== "") {
              result.push(row);
            }
            row = [];
            value = "";
          } else {
            value += char;
          }
        }

        if (value.length > 0 || row.length > 0) {
          row.push(value);
          result.push(row);
        }

        if (result.length === 0) return [];

        const headers = result[0].map((h) => h.trim());
        return result.slice(1).map((cells) => {
          const obj = {};
          headers.forEach((h, i) => {
            obj[h] = (cells[i] || "").trim();
          });
          return obj;
        });
      }

      function loadLocations() {
        try {
          const raw = localStorage.getItem(STORAGE_LOCATIONS_KEY);
          if (!raw) return [...FALLBACK_LOCATIONS];
          const parsed = JSON.parse(raw);
          if (!Array.isArray(parsed)) return [...FALLBACK_LOCATIONS];
          const unique = [...new Set(parsed.map((v) => String(v).trim()).filter(Boolean))];
          return unique.length ? unique : [...FALLBACK_LOCATIONS];
        } catch {
          return [...FALLBACK_LOCATIONS];
        }
      }

      function saveLocations(locations) {
        localStorage.setItem(STORAGE_LOCATIONS_KEY, JSON.stringify(locations));
      }

      function loadHiddenTrendLocations() {
        try {
          const raw = localStorage.getItem(STORAGE_TREND_HIDDEN_KEY);
          if (!raw) return new Set();
          const parsed = JSON.parse(raw);
          if (!Array.isArray(parsed)) return new Set();
          return new Set(parsed.map((v) => String(v).trim()).filter(Boolean));
        } catch {
          return new Set();
        }
      }

      function saveHiddenTrendLocations() {
        localStorage.setItem(
          STORAGE_TREND_HIDDEN_KEY,
          JSON.stringify([...hiddenTrendLocations])
        );
      }

      function updateStatus(message, isError = false) {
        els.status.textContent = message;
        els.status.classList.toggle("error", isError);
      }

      function parseRowDate(row) {
        if (!row || !row.time) return null;
        const parsed = new Date(row.time.replace(" ", "T"));
        if (Number.isNaN(parsed.getTime())) return null;
        return parsed;
      }

      function getValidRows() {
        return rows.reduce((acc, row) => {
          const city = row.cities;
          if (!city) return acc;
          const rowDate = parseRowDate(row);
          if (!rowDate || rowDate < MIN_DATE) return acc;
          acc.push({ city, date: rowDate });
          return acc;
        }, []);
      }

      function countByLocation() {
        return getValidRows().reduce((map, row) => {
          map[row.city] = (map[row.city] || 0) + 1;
          return map;
        }, {});
      }

      function getSortedLocationData() {
        const locations = loadLocations();
        const counts = countByLocation();
        const sortedLocations = [...locations].sort((a, b) => {
          const countDiff = (counts[b] || 0) - (counts[a] || 0);
          if (countDiff !== 0) return countDiff;
          return a.localeCompare(b);
        });
        return sortedLocations.map((location) => ({ location, count: counts[location] || 0 }));
      }

      function renderTable() {
        const data = getSortedLocationData();
        els.tableBody.innerHTML = "";

        data.forEach(({ location, count }) => {
          const tr = document.createElement("tr");
          tr.dataset.location = location;
          tr.classList.toggle("selected", location === selectedLocation);
          const locationCell = document.createElement("td");
          const countCell = document.createElement("td");
          locationCell.textContent = location;
          countCell.textContent = count.toLocaleString();
          tr.append(locationCell, countCell);
          els.tableBody.appendChild(tr);
        });
      }

      function renderGraph() {
        const data = getSortedLocationData();
        const maxCount = data.reduce((max, item) => Math.max(max, item.count), 0) || 1;
        els.graphBars.innerHTML = "";

        data.forEach(({ location, count }, index) => {
          const row = document.createElement("div");
          row.className = "bar-row";
          row.dataset.location = location;
          row.classList.toggle("selected", location === selectedLocation);

          const label = document.createElement("div");
          label.className = "bar-label";
          if (index < 3) {
            const badge = document.createElement("span");
            badge.className = "podium-badge";
            if (index === 0) badge.classList.add("podium-gold");
            if (index === 1) badge.classList.add("podium-silver");
            if (index === 2) badge.classList.add("podium-bronze");
            badge.innerHTML =
              `<svg class="podium-icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M18 2H6v3H3v3c0 2.76 2.24 5 5 5h.28A6.99 6.99 0 0 0 11 16.93V20H8v2h8v-2h-3v-3.07A6.99 6.99 0 0 0 15.72 13H16c2.76 0 5-2.24 5-5V5h-3V2Zm-2 9V4H8v7a4 4 0 1 0 8 0ZM5 8V7h1v3.82A3 3 0 0 1 5 8Zm14 0a3 3 0 0 1-1 2.24V7h1v1Z"/></svg><span class="podium-rank">${index + 1}</span>`;
            label.appendChild(badge);
          }
          label.appendChild(document.createTextNode(location));

          const track = document.createElement("div");
          track.className = "bar-track";
          const fill = document.createElement("div");
          fill.className = "bar-fill";
          fill.style.width = `${(count / maxCount) * 100}%`;
          track.appendChild(fill);

          const value = document.createElement("div");
          value.className = "bar-value";
          value.textContent = count.toLocaleString();

          row.append(label, track, value);
          els.graphBars.appendChild(row);
        });
      }

      function getDayStart(date) {
        const d = new Date(date);
        d.setHours(0, 0, 0, 0);
        return d;
      }

      function getWeekStart(date) {
        const d = getDayStart(date);
        const dayIndex = (d.getDay() + 6) % 7;
        d.setDate(d.getDate() - dayIndex);
        return d;
      }

      function getBucketKey(date, bucket) {
        const start = bucket === "week" ? getWeekStart(date) : getDayStart(date);
        return start.toISOString().slice(0, 10);
      }

      function buildTrendData(bucket, rangeValue) {
        const locations = loadLocations();
        const validRows = getValidRows();
        const filteredHidden = new Set(
          [...hiddenTrendLocations].filter((location) => locations.includes(location))
        );
        if (filteredHidden.size !== hiddenTrendLocations.size) {
          hiddenTrendLocations = filteredHidden;
          saveHiddenTrendLocations();
        }

        if (validRows.length === 0) {
          return {
            locations,
            bucketItems: [],
            series: new Map(),
            maxValue: 0,
          };
        }

        const latestDate = validRows.reduce(
          (latest, row) => (row.date > latest ? row.date : latest),
          validRows[0].date
        );

        let cutoff = null;
        if (rangeValue !== "all") {
          const days = Number(rangeValue);
          if (!Number.isNaN(days)) {
            cutoff = getDayStart(new Date(latestDate));
            cutoff.setDate(cutoff.getDate() - days + 1);
          }
        }

        const bucketMap = new Map();
        const series = new Map();
        locations.forEach((location) => {
          series.set(location, new Map());
        });

        validRows.forEach(({ city, date }) => {
          if (cutoff && date < cutoff) return;
          if (!series.has(city)) return;
          const key = getBucketKey(date, bucket);
          if (!bucketMap.has(key)) {
            bucketMap.set(key, bucket === "week" ? getWeekStart(date) : getDayStart(date));
          }
          const locationSeries = series.get(city);
          locationSeries.set(key, (locationSeries.get(key) || 0) + 1);
        });

        const bucketItems = [...bucketMap.entries()]
          .map(([key, date]) => ({ key, date }))
          .sort((a, b) => a.date - b.date);

        if (bucketItems.length > 0) {
          const firstDate = bucketItems[0].date;
          const preDate = new Date(firstDate);
          if (bucket === "week") {
            preDate.setDate(preDate.getDate() - 7);
          } else {
            preDate.setDate(preDate.getDate() - 1);
          }
          const preKey = getBucketKey(preDate, bucket);
          if (!bucketItems.some((item) => item.key === preKey)) {
            bucketItems.unshift({ key: preKey, date: preDate });
          }
        }

        let maxValue = 0;
        locations.forEach((location) => {
          const locationSeries = series.get(location) || new Map();
          let runningTotal = 0;
          bucketItems.forEach((item) => {
            runningTotal += locationSeries.get(item.key) || 0;
            locationSeries.set(item.key, runningTotal);
            if (runningTotal > maxValue) maxValue = runningTotal;
          });
        });

        return { locations, bucketItems, series, maxValue };
      }

      function renderTrend() {
        const bucket = els.trendBucket.value;
        const rangeValue = els.trendRange.value;
        const { locations, bucketItems, series, maxValue } = buildTrendData(bucket, rangeValue);

        els.trendChart.innerHTML = "";
        const legendButtons = els.trendLegend.querySelectorAll("button");
        els.trendLegend.innerHTML = "";
        legendButtons.forEach((button) => els.trendLegend.appendChild(button));

        if (bucketItems.length === 0) {
          const empty = document.createElement("div");
          empty.className = "trend-empty";
          empty.textContent = "No alert data available for the selected range.";
          els.trendChart.appendChild(empty);
          return;
        }

        const width = Math.max(640, bucketItems.length * 26);
        const height = 320;
        const padding = { top: 20, right: 20, bottom: 45, left: 48 };
        const plotWidth = width - padding.left - padding.right;
        const plotHeight = height - padding.top - padding.bottom;
        const maxY = maxValue > 0 ? maxValue : 1;

        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("width", String(width));
        svg.setAttribute("height", String(height));
        svg.setAttribute("viewBox", `0 0 ${width} ${height}`);
        svg.setAttribute("role", "img");
        svg.setAttribute("aria-label", "Alert counts over time");

        const axis = document.createElementNS("http://www.w3.org/2000/svg", "g");
        axis.setAttribute("stroke", "#a2b6c3");
        axis.setAttribute("stroke-width", "1");

        const yTicks = 4;
        for (let i = 0; i <= yTicks; i += 1) {
          const value = Math.round((maxY / yTicks) * i);
          const y = padding.top + plotHeight - (plotHeight * i) / yTicks;
          const tick = document.createElementNS("http://www.w3.org/2000/svg", "line");
          tick.setAttribute("x1", String(padding.left));
          tick.setAttribute("x2", String(width - padding.right));
          tick.setAttribute("y1", String(y));
          tick.setAttribute("y2", String(y));
          tick.setAttribute("stroke", "#e3edf3");
          axis.appendChild(tick);

          const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
          label.setAttribute("x", String(padding.left - 10));
          label.setAttribute("y", String(y + 4));
          label.setAttribute("text-anchor", "end");
          label.setAttribute("fill", "#60707b");
          label.setAttribute("font-size", "11");
          label.textContent = value.toLocaleString();
          svg.appendChild(label);
        }

        svg.appendChild(axis);

        const points = bucketItems.map((item, index) => {
          const x =
            bucketItems.length === 1
              ? padding.left + plotWidth / 2
              : padding.left + (plotWidth * index) / (bucketItems.length - 1);
          return { x, date: item.date, key: item.key };
        });

        const xLabelStep = Math.max(1, Math.ceil(points.length / 6));
        points.forEach((point, index) => {
          if (index % xLabelStep !== 0 && index !== points.length - 1) return;
          const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
          label.setAttribute("x", String(point.x));
          label.setAttribute("y", String(height - 18));
          label.setAttribute("text-anchor", "middle");
          label.setAttribute("fill", "#60707b");
          label.setAttribute("font-size", "11");
          label.textContent = point.date.toLocaleDateString(undefined, {
            month: "short",
            day: "numeric",
          });
          svg.appendChild(label);
        });

        locations.forEach((location, index) => {
          const locationSeries = series.get(location);
          if (!locationSeries) return;
          let hasValue = false;
          const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
          const color = TREND_COLORS[index % TREND_COLORS.length];
          const isHidden = hiddenTrendLocations.has(location);
          const segments = points
            .map((point, pointIndex) => {
              const value = locationSeries.get(point.key) || 0;
              if (value > 0) hasValue = true;
              const y = padding.top + plotHeight - (plotHeight * value) / maxY;
              const prefix = pointIndex === 0 ? "M" : "L";
              return `${prefix}${point.x},${y}`;
            })
            .join(" ");

          if (!isHidden) {
            path.setAttribute("d", segments);
            path.setAttribute("fill", "none");
            path.setAttribute("stroke", color);
            path.setAttribute("stroke-width", "2.2");
            path.setAttribute("opacity", hasValue ? "1" : "0.3");
            svg.appendChild(path);
          }

          const legendItem = document.createElement("span");
          legendItem.classList.toggle("hidden", isHidden);
          legendItem.setAttribute("role", "button");
          legendItem.setAttribute("tabindex", "0");
          legendItem.setAttribute(
            "aria-label",
            `${isHidden ? "Show" : "Hide"} ${location} series`
          );
          const swatch = document.createElement("span");
          swatch.className = "legend-swatch";
          swatch.style.background = color;
          legendItem.appendChild(swatch);
          legendItem.appendChild(document.createTextNode(location));
          legendItem.addEventListener("click", () => {
            if (hiddenTrendLocations.has(location)) {
              hiddenTrendLocations.delete(location);
            } else {
              hiddenTrendLocations.add(location);
            }
            saveHiddenTrendLocations();
            renderTrend();
          });
          legendItem.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              legendItem.click();
            }
          });
          els.trendLegend.appendChild(legendItem);
        });

        els.trendChart.appendChild(svg);
      }

      function renderViews() {
        renderTable();
        renderGraph();
        renderTrend();
      }

      function setView(view) {
        currentView = view;
        localStorage.setItem(STORAGE_VIEW_KEY, view);
        const showTable = currentView === "table";
        const showGraph = currentView === "graph";
        const showTrend = currentView === "trend";
        els.tableView.classList.toggle("hidden", !showTable);
        els.graphView.classList.toggle("hidden", !showGraph);
        els.trendView.classList.toggle("hidden", !showTrend);
        els.tableViewBtn.classList.toggle("secondary", !showTable);
        els.graphViewBtn.classList.toggle("secondary", !showGraph);
        els.trendViewBtn.classList.toggle("secondary", !showTrend);
      }

      function renderAutocomplete() {
        els.cityOptions.innerHTML = "";

        citySuggestions.forEach((city) => {
          const option = document.createElement("option");
          option.value = city;
          els.cityOptions.appendChild(option);
        });
      }

      async function refreshData() {
        updateStatus("Refreshing data...");
        els.refreshBtn.disabled = true;

        try {
          const response = await fetch(DATA_URL, { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const text = await response.text();
          rows = parseCSV(text);
          citySuggestions = [...new Set(rows.map((row) => row.cities).filter(Boolean))].sort((a, b) =>
            a.localeCompare(b)
          );
          els.totalRows.textContent = rows.length.toLocaleString();
          els.lastRefreshed.textContent = new Date().toLocaleString();
          renderAutocomplete();
          renderViews();
          updateStatus("Data refreshed successfully.");
        } catch (error) {
          updateStatus(`Failed to refresh data: ${error.message}`, true);
        } finally {
          els.refreshBtn.disabled = false;
        }
      }

      function addLocation() {
        const value = els.newLocationInput.value.trim();
        if (!value) {
          updateStatus("Enter a location name before adding.", true);
          return;
        }

        const locations = loadLocations();
        if (locations.includes(value)) {
          updateStatus("Location already exists.", true);
          return;
        }

        if (citySuggestions.length > 0 && !citySuggestions.includes(value)) {
          updateStatus("Location must match a city that exists in the CSV.", true);
          return;
        }

        locations.push(value);
        saveLocations(locations);
        selectedLocation = value;
        renderViews();
        els.newLocationInput.value = "";
        updateStatus(`Added location: ${value}`);
      }

      function removeSelectedLocation() {
        const selected = selectedLocation;
        if (!selected) {
          updateStatus("Select a location in the table to remove.", true);
          return;
        }

        const locations = loadLocations().filter((location) => location !== selected);

        if (locations.length === 0) {
          updateStatus("Keep at least one location in the list.", true);
          return;
        }

        saveLocations(locations);
        selectedLocation = locations[0] || "";
        renderViews();
        updateStatus(`Removed location: ${selected}`);
      }

      function bindEvents() {
        els.refreshBtn.addEventListener("click", refreshData);
        els.addLocationBtn.addEventListener("click", addLocation);
        els.removeLocationBtn.addEventListener("click", removeSelectedLocation);
        els.tableViewBtn.addEventListener("click", () => setView("table"));
        els.graphViewBtn.addEventListener("click", () => setView("graph"));
        els.trendViewBtn.addEventListener("click", () => setView("trend"));
        els.trendBucket.addEventListener("change", renderTrend);
        els.trendRange.addEventListener("change", renderTrend);
        els.trendHideAll.addEventListener("click", () => {
          hiddenTrendLocations = new Set(loadLocations());
          saveHiddenTrendLocations();
          renderTrend();
        });
        els.trendShowAll.addEventListener("click", () => {
          hiddenTrendLocations.clear();
          saveHiddenTrendLocations();
          renderTrend();
        });
        els.tableBody.addEventListener("click", (event) => {
          const row = event.target.closest("tr");
          if (!row || !row.dataset.location) return;
          selectedLocation = row.dataset.location;
          renderViews();
        });
        els.graphBars.addEventListener("click", (event) => {
          const row = event.target.closest(".bar-row");
          if (!row || !row.dataset.location) return;
          selectedLocation = row.dataset.location;
          renderViews();
        });

        els.newLocationInput.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            addLocation();
          }
        });
      }

      function init() {
        selectedLocation = loadLocations()[0] || "";
        hiddenTrendLocations = loadHiddenTrendLocations();
        renderViews();
        const savedView = localStorage.getItem(STORAGE_VIEW_KEY);
        const initialView = ["table", "graph", "trend"].includes(savedView)
          ? savedView
          : "graph";
        setView(initialView);
        bindEvents();
        refreshData();
      }

      init();
    </script>
